<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escreva uma história</title>

<style>

body {
    margin: 0;
    background-image: url('https://i.postimg.cc/DybTqPjr/livros.avif');
    background-size: cover;
    background-position: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(0,0,0,0.75);
    padding: 20px;
    border-radius: 15px;
    width: 400px;
    color: white;

    display: flex;
    flex-direction: column;
    gap: 10px;
}

#titulo {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    box-sizing: border-box;
}

.toolbar {
    display: flex;
    gap: 6px;
}

.toolbar button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.editor {
    width: 100%;
    height: 180px;
    background: white;
    color: black;
    border-radius: 10px;
    padding: 10px;
    outline: none;
    overflow-y: auto;
    box-sizing: border-box;
}

/* contador */
#contador {
    text-align: right;
    font-size: 14px;
    color: #ccc;
}

/* salvar */
button.salvar {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #95a5a6;
    color: white;
    cursor: pointer;
}

button.salvar:hover {
    background: #1abc9c;
}

/* voltar */
.voltar {
    position: absolute;
    top: 15px;
    left: 15px;
    padding: 10px 15px;
    background: rgba(0,0,0,0.7);
    color: white;
    text-decoration: none;
    border-radius: 10px;
}

</style>
</head>

<body>

<a href="menu.html" class="voltar">⬅ Voltar</a>

<div class="box">

<h2>✍️ Escreva sua história</h2>

<!-- TÍTULO -->
<input id="titulo" placeholder="Título da história...">

<!-- BOTÕES -->
<div class="toolbar">
    <button onclick="formatar('bold')"><b>B</b></button>
    <button onclick="formatar('italic')"><i>I</i></button>
    <button onclick="formatar('underline')"><u>U</u></button>
</div>

<!-- EDITOR (SEM CORRETOR) -->
<div id="texto" class="editor" contenteditable="true" spellcheck="false">
Escreva sua história aqui...
</div>

<!-- CONTADOR -->
<p id="contador">0 palavras | 0 caracteres</p>

<button class="salvar" onclick="salvar()">Salvar</button>

</div>

<script>

function formatar(comando) {
    document.execCommand(comando, false, null);
}

/* edição */
let id = new URLSearchParams(window.location.search).get("id");
let historias = JSON.parse(localStorage.getItem("historias")) || [];

if (id !== null && historias[id]) {
    document.getElementById("texto").innerHTML = historias[id].conteudo;
    document.getElementById("titulo").value = historias[id].titulo || "";
}

/* salvar */
function salvar() {
    let texto = document.getElementById("texto").innerHTML;
    let titulo = document.getElementById("titulo").value.trim();

    if (titulo === "") titulo = "Sem título";

    if (texto.replace(/<[^>]*>/g, '').trim() === "") {
        alert("Escreva algo!");
        return;
    }

    let historias = JSON.parse(localStorage.getItem("historias")) || [];

    if (id !== null && historias[id]) {
        historias[id].titulo = titulo;
        historias[id].conteudo = texto;
    } else {
        historias.push({
            titulo: titulo,
            conteudo: texto,
            data: new Date().toLocaleString()
        });
    }

    localStorage.setItem("historias", JSON.stringify(historias));
    window.location.href = "historico.html";
}

/* CONTADOR */
function atualizarContador() {
    let texto = document.getElementById("texto").innerText.trim();

    let palavras = texto === "" ? 0 : texto.split(/\s+/).length;
    let caracteres = texto.length;

    document.getElementById("contador").innerText =
        palavras + " palavras | " + caracteres + " caracteres";
}

/* eventos do contador */
const editor = document.getElementById("texto");

editor.addEventListener("input", atualizarContador);

/* iniciar contador */
atualizarContador();

</script>

</body>
</html>
