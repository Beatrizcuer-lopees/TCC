<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escreva uma história</title>

<style>

/* FUNDO */
body {
    margin: 0;
    background-image: url('https://i.postimg.cc/DybTqPjr/livros.avif');
    background-size: cover;
    background-position: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* botão voltar */
.voltar {
    position: absolute;
    top: 15px;
    left: 15px;
    padding: 10px 15px;
    background: rgba(0,0,0,0.7);
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    transition: 0.3s;
}

.voltar:hover {
    background: #1abc9c;
}

/* caixa */
.box {
    background: rgba(0,0,0,0.75);
    padding: 20px;
    border-radius: 15px;
    width: 400px;
    color: white;

    display: flex;
    flex-direction: column;
}

/* toolbar */
.toolbar {
    margin-bottom: 10px;
}

.toolbar button {
    padding: 5px 10px;
    margin-right: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.toolbar button:hover {
    background: #1abc9c;
    color: white;
}

/* editor */
.editor {
    width: 100%;
    height: 150px;
    background: white;
    color: black;
    border-radius: 10px;
    padding: 10px;
    outline: none;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.5;

    box-sizing: border-box;
}

/* botão salvar */
button.salvar {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #95a5a6;
    color: white;
    cursor: pointer;
    transition: 0.3s;

    box-sizing: border-box;
}

button.salvar:hover {
    background: #1abc9c;
}

</style>

</head>

<body>

<a href="menu.html" class="voltar">⬅ Voltar ao menu</a>

<div class="box">
    <h2>✍️ Escreva sua história</h2>

    <!-- BOTÕES -->
    <div class="toolbar">
        <button onclick="formatar('bold')"><b>B</b></button>
        <button onclick="formatar('italic')"><i>I</i></button>
        <button onclick="formatar('underline')"><u>U</u></button>
    </div>

    <!-- EDITOR -->
    <div id="texto" class="editor" contenteditable="true" spellcheck="true">
        Escreva sua história aqui...
    </div>

    <button class="salvar" onclick="salvar()">Salvar</button>
</div>

<script>

function formatar(comando) {
    const editor = document.getElementById("texto");
    editor.focus();
    document.execCommand(comando, false, null);
}

let id = new URLSearchParams(window.location.search).get("id");

let historias = JSON.parse(localStorage.getItem("historias")) || [];

if (id !== null && historias[id]) {
    document.getElementById("texto").innerHTML = historias[id].conteudo;
}

function salvar() {
    let texto = document.getElementById("texto").innerHTML;

    if (texto.replace(/<[^>]*>/g, '').trim() === "") {
        alert("Escreva algo!");
        return;
    }

    let historias = JSON.parse(localStorage.getItem("historias")) || [];

    if (id !== null && historias[id]) {
        historias[id].conteudo = texto;
    } else {
        historias.push({
            conteudo: texto,
            data: new Date().toLocaleString()
        });
    }

    localStorage.setItem("historias", JSON.stringify(historias));

    window.location.href = "historico.html";
}

</script>

</body>
</html>
