<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Histórico</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url('https://i.postimg.cc/DybTqPjr/livros.avif');
    background-size: cover;
    background-position: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(0,0,0,0.75);
    padding: 20px;
    border-radius: 15px;
    width: 380px;
    color: white;
    text-align: center;
}

.item {
    background: rgba(255,255,255,0.1);
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.item:hover {
    background: #1abc9c;
}

.del {
    background: red;
    border: none;
    color: white;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>📜 Histórico</h2>

<div id="lista"></div>

<button onclick="voltarMenu()" style="
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#95a5a6;
    color:white;
">
Voltar
</button>

</div>

<script>

function carregar() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let historias = JSON.parse(localStorage.getItem("historias")) || [];

    if (historias.length === 0) {
        lista.innerHTML = "<p>Nenhuma história ainda</p>";
        return;
    }

    historias.forEach((h, index) => {

        let div = document.createElement("div");
        div.className = "item";

        div.onclick = () => {
            window.location.href = "escrever.html?id=" + index;
        };

        let texto = document.createElement("span");

        // 👇 AQUI É A MUDANÇA PRINCIPAL
        texto.innerText = h.titulo || "Sem título";

        let btn = document.createElement("button");
        btn.innerText = "🗑️";
        btn.className = "del";

        btn.onclick = (e) => {
            e.stopPropagation();

            if (confirm("Excluir história?")) {
                deletar(index);
            }
        };

        div.appendChild(texto);
        div.appendChild(btn);
        lista.appendChild(div);
    });
}

function deletar(index) {
    let historias = JSON.parse(localStorage.getItem("historias")) || [];
    historias.splice(index, 1);
    localStorage.setItem("historias", JSON.stringify(historias));
    carregar();
}

function voltarMenu() {
    window.location.href = "menu.html";
}

carregar();

</script>

</body>
</html>
