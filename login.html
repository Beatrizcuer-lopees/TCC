<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Entrar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://i.postimg.cc/DybTqPjr/livros.avif') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔙 voltar */
.voltar {
    position: absolute;
    top: 15px;
    left: 15px;
    padding: 10px 15px;
    background: rgba(0,0,0,0.7);
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    transition: 0.3s;
}

.voltar:hover {
    background: #1abc9c;
}

/* container */
.container {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* 🔥 BOTÃO IGUAL AO RESTO DO SITE */
.btn {
    display: inline-block;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
    font-weight: bold;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    background-color: #95a5a6;
}

.btn:hover {
    background: #1abc9c;
    transform: scale(1.03);
}

#msg {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔙 VOLTAR -->
<a href="cadastro.html" class="voltar">⬅ Voltar para o cadastro</a>

<div class="container">
    <h2>Entrar</h2>

    <form onsubmit="login(event)">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">

        <!-- 🔥 BOTÃO PADRÃO DO SITE -->
        <button type="submit" class="btn">Entrar</button>
    </form>

    <p id="msg"></p>
</div>

<script>
function login(event) {
    event.preventDefault();

    let email = document.getElementById("email").value.trim();
    let senha = document.getElementById("senha").value.trim();
    let msg = document.getElementById("msg");

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    let usuario = usuarios.find(u => u.email === email && u.senha === senha);

    if (usuario) {
        msg.style.color = "green";
        msg.textContent = "Login realizado com sucesso!";

        localStorage.setItem("usuarioLogado", JSON.stringify(usuario));

        setTimeout(() => {
            window.location.href = "menu.html";
        }, 1000);
    } else {
        msg.style.color = "red";
        msg.textContent = "Email ou senha inválidos!";
    }
}
</script>

</body>
</html>
